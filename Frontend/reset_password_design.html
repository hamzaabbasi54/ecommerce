<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop">
<!-- Reset Password Card -->
<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-lg p-xl flex flex-col gap-lg shadow-[0_1px_2px_rgba(0,0,0,0.04)]">
<!-- Header -->
<header class="text-center flex flex-col gap-sm">
<h1 class="font-h3 text-h3 text-on-surface">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                Enter your new password below to regain access to your account.
            </p>
</header>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- New Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="new-password">New Password</label>
<input class="w-full h-12 px-md border border-[#D1D1D6] rounded-DEFAULT bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-0 transition-colors" id="new-password" name="new-password" placeholder="Enter new password" required="" type="password"/>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface" for="confirm-password">Confirm Password</label>
<input class="w-full h-12 px-md border border-[#D1D1D6] rounded-DEFAULT bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary-container focus:ring-0 transition-colors" id="confirm-password" name="confirm-password" placeholder="Confirm new password" required="" type="password"/>
</div>
<!-- Action Button -->
<button class="w-full h-12 mt-sm bg-primary-container text-on-primary font-button text-button uppercase rounded-lg hover:bg-primary transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-surface" type="submit">
                RESET PASSWORD
            </button>
</form>
<!-- Back to Login Link -->
<div class="text-center mt-sm">
<a class="font-body-md text-body-md text-primary-container hover:text-primary transition-colors inline-flex items-center gap-xs" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
<!-- Footer (Simplified for contextual transactional page) -->
<footer class="mt-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
            © 2024 Electronica. Engineered Excellence.
        </p>
</footer>
