<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - Electronica</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "secondary-container": "#e5e2e1",

                        "secondary": "#5f5e5e",
                        "on-surface-variant": "#424656",
                        "on-secondary-fixed": "#1c1b1b",
                        "secondary-fixed": "#e5e2e1",
                        "on-surface": "#1a1b1f",
                        "on-tertiary-fixed-variant": "#454749",
                        "primary-fixed-dim": "#b3c5ff",
                        "tertiary": "#58595b",
                        "inverse-surface": "#2f3034",
                        "on-tertiary-fixed": "#1a1c1d",
                        "on-primary-fixed-variant": "#003fa4",
                        "background": "#faf8fe",
                        "primary-container": "#0066ff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface": "#faf8fe",
                        "inverse-primary": "#b3c5ff",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#e2e2e4",

                        "tertiary-fixed-dim": "#c6c6c8",

                        "tertiary-container": "#707274",

                        "error": "#ba1a1a",

                        "on-primary-fixed": "#001849",

                        "on-secondary": "#ffffff",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xxl": "80px",
                        "xl": "48px",
                        "margin-desktop": "40px",
                        "gutter": "24px",

                        "md": "16px",

<style>
        .custom-input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center font-body-md p-margin-mobile md:p-margin-desktop antialiased">
<!-- Main Container -->
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Brand / Header -->
<div class="mb-xl text-center w-full">
<h1 class="font-h1 text-h1 text-on-surface mb-sm tracking-tighter">Electronica</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Create your account.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest w-full border border-outline-variant p-xl rounded-DEFAULT shadow-[0_1px_2px_rgba(0,0,0,0.04)]">
<form action="#" class="space-y-lg" method="POST">
<!-- Full Name Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-sm" for="fullName">Full Name</label>
<input class="custom-input block w-full bg-surface-container-lowest border border-[#D1D1D6] rounded-DEFAULT py-sm px-md font-body-md text-body-md text-on-surface transition-colors duration-200" id="fullName" name="fullName" required="" type="text"/>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-sm" for="email">Email Address</label>
<input class="custom-input block w-full bg-surface-container-lowest border border-[#D1D1D6] rounded-DEFAULT py-sm px-md font-body-md text-body-md text-on-surface transition-colors duration-200" id="email" name="email" required="" type="email"/>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-sm" for="password">Password</label>
<input class="custom-input block w-full bg-surface-container-lowest border border-[#D1D1D6] rounded-DEFAULT py-sm px-md font-body-md text-body-md text-on-surface transition-colors duration-200" id="password" name="password" required="" type="password"/>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-sm" for="confirmPassword">Confirm Password</label>
<input class="custom-input block w-full bg-surface-container-lowest border border-[#D1D1D6] rounded-DEFAULT py-sm px-md font-body-md text-body-md text-on-surface transition-colors duration-200" id="confirmPassword" name="confirmPassword" required="" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-button text-button uppercase py-md rounded-DEFAULT hover:opacity-90 transition-opacity duration-200 flex items-center justify-center gap-sm mt-xl" type="submit">
                    CREATE ACCOUNT
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</form>
</div>
<!-- Secondary Action -->
<div class="mt-lg text-center w-full">
<a class="font-body-md text-body-md text-on-surface-variant hover:text-primary-container hover:underline transition-colors duration-200" href="#">
                Already have an account? Log in
            </a>
</div>
</main>
</body></html>
