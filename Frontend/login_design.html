<style type="text/tailwindcss">
        @layer utilities {
            .tech-shadow {
                box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.04);
            }
        }

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center px-margin-mobile md:px-margin-desktop font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="w-full max-w-[440px]">
<!-- Brand / Header -->
<div class="text-center mb-xl">
<h1 class="font-h3 text-h3 tracking-tighter text-primary">Electronica</h1>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-lg tech-shadow p-8 md:p-10">
<h2 class="font-h2 text-h2 mb-8 text-on-surface">Log In</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="email">Email Address</label>
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors duration-200" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<input class="w-full h-12 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Primary Button -->
<button class="w-full h-12 bg-primary-container text-on-primary-container font-button text-button rounded-lg hover:bg-primary transition-colors duration-200 mt-2" type="submit">
                    LOG IN
                </button>
</form>
<!-- Links -->
<div class="mt-6 text-center space-y-4">
<a class="block font-body-md text-body-md text-on-surface-variant hover:text-on-surface transition-colors duration-200" href="#">
                    Forgot Password?
                </a>
<div class="font-body-md text-body-md text-on-surface-variant pt-4 border-t border-outline-variant/30">
                    Don't have an account? 
                    <a class="text-primary-container hover:text-primary hover:underline transition-colors duration-200 font-medium" href="#">
                        Register
                    </a>
</div>
</div>
</div>
</main>
</body></html>
